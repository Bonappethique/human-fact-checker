name: Mise à jour de la base de fact-checks

on:
  schedule:
    - cron: '0 3 * * *' # Tous les jours à 03:00 UTC
  workflow_dispatch: # Déclenchement manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement du scraper
        run: python scraper.py

      - name: Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/factchecks.json
          git diff --cached --quiet || (git commit -m "🔄 Mise à jour automatique de la base de fact-checks" && git push)
