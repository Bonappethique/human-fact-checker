name: Mise à jour de la base de fact-checks

on:
  schedule:
    - cron: '0 3 * * *'  # Tous les jours à 03:00 UTC
  workflow_dispatch:       # Déclenchement manuel

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Lancement du collecteur
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SCRAPE_MODE: ${{ vars.SCRAPE_MODE || 'QUOTIDIEN' }}
        run: python scraper.py

      - name: Commit et push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/factchecks.json
          git diff --cached --quiet || (
            git commit -m "🔄 MAJ fact-checks — $(date -u +%Y-%m-%d) [${SCRAPE_MODE:-QUOTIDIEN}]" &&
            git push
          )
        env:
          SCRAPE_MODE: ${{ vars.SCRAPE_MODE || 'QUOTIDIEN' }}
